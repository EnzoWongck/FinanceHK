<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;-webkit-text-size-adjust:100%}
:root{--bg:#12141b;--bg2:#1a1d25;--bg3:#202430;--bg4:#171a22;--text:#f2f2f4;--text2:#9ea3b3;--primary:#ff8a72;--primary-d:#ea6f56;--success:#57c498;--danger:#ff7d71;--warning:#ffbe6b;--border:#2b3040;--r:18px;--nav-h:72px;--sab:env(safe-area-inset-bottom,0px)}
body{background:radial-gradient(1200px 600px at 50% -120px,#2a2f3d 0%,#171922 48%,#11131a 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-top:constant(safe-area-inset-top);padding-top:env(safe-area-inset-top);padding-bottom:calc(var(--nav-h) + var(--sab));touch-action:manipulation}
.page{display:none;padding:16px;max-width:480px;margin:0 auto}
.page.active{display:block}
h2{font-size:20px;font-weight:700;margin-bottom:14px;color:var(--text);letter-spacing:.2px}
h3{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text2)}
.card{background:linear-gradient(160deg,#1f222b,#171a21);border-radius:22px;padding:16px;margin-bottom:14px;border:1px solid rgba(255,255,255,.06);box-shadow:0 12px 30px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.03)}
.nw-card{background:linear-gradient(155deg,#20242d,#171a21);border-radius:28px;padding:20px 20px 16px;margin-bottom:14px;border:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden;box-shadow:0 20px 32px rgba(0,0,0,.28)}
.nw-growth{position:absolute;top:14px;right:14px;background:rgba(87,196,152,.18);color:#8ae5bc;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
.nw-label{font-size:13px;color:#c4c8d4;margin-bottom:8px}
.nw-value{font-size:54px;font-weight:800;letter-spacing:.4px;color:#f3f4f8;line-height:1}
.nw-sub{display:flex;gap:14px;margin-top:10px}
.nw-sub-item{flex:1}
.nw-sub-label{font-size:12px;color:var(--text2);margin-bottom:3px}
.nw-sub-value{font-size:26px;font-weight:700;line-height:1}
.nw-sub-value.pos{color:#cfd4df}
.nw-sub-value.neg{color:#cfd4df}
.hero-sparkline{display:block;width:100%;height:56px!important;margin-top:10px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.btn{background:var(--primary);color:#fff;border:none;border-radius:12px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s,transform .15s;box-shadow:0 10px 18px rgba(255,138,114,.22)}
.btn:active{background:var(--primary-d)}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:6px}
.btn-danger{background:var(--danger)}
.btn-danger:active{background:#c62828}
.btn-ghost{background:#3a3a4a;border:1px solid #4a4a5a;color:#b9becc;box-shadow:none}
.btn-ghost:active{background:var(--bg3)}
input,select,textarea{background:#1f232d;border:1px solid #363d50;border-radius:12px;color:var(--text);font-size:16px;padding:11px 12px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;touch-action:manipulation}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,138,114,.16)}
select option{background:var(--bg3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:13px;color:#999;margin-bottom:6px}
.row-item{background:linear-gradient(180deg,#1f232d,#181b23);border-radius:14px;padding:12px;margin-bottom:8px;border:1px solid #2f3442}
.row-item:last-child{margin-bottom:0}
.row-header{display:flex;align-items:center;justify-content:space-between}
.row-title{font-size:14px;font-weight:600}
.row-sub{font-size:12px;color:var(--text2);margin-top:2px}
.row-amount{font-size:16px;font-weight:700}
.amount-pos{color:var(--success)}
.amount-neg{color:var(--danger)}
.amount-neutral{color:var(--text)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:12px;font-weight:600}
.badge-income{background:#1b3a1b;color:var(--success)}
.badge-expense{background:#3a1b1b;color:var(--danger)}
.badge-poker{background:#1b2a3a;color:#64b5f6}
.chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 12px;font-size:13px;cursor:pointer;color:var(--text2);transition:all .15s;white-space:nowrap}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.bottom-nav{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);width:min(92vw,450px);background:rgba(30,34,45,.92);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:22px;display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:100;box-shadow:0 14px 34px rgba(0,0,0,.35)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 6px;cursor:pointer;color:var(--text2);font-size:10px;gap:4px;transition:color .15s,transform .15s;border:none;background:none;min-height:calc(var(--nav-h) - 10px);letter-spacing:.3px}
.nav-item.active{color:#fff}
.nav-item.active svg{background:var(--primary);color:#fff;padding:6px;border-radius:999px;box-shadow:0 8px 16px rgba(255,138,114,.32)}
.nav-item svg{width:22px;height:22px;display:block;flex-shrink:0}

.divider{height:1px;background:var(--border);margin:12px 0}
.empty{text-align:center;padding:32px 0;color:var(--text2);font-size:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#1e1e2e;border-radius:16px;padding:24px;width:90%;max-width:400px;max-height:85vh;overflow-y:auto;border:1px solid rgba(255,255,255,.07)}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;color:#fff}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.modal-actions .btn{flex:1;border-radius:10px;padding:14px;font-size:16px;font-weight:700}
.modal input,.modal select,.modal textarea{background:#3a3a4a;border:1px solid #4a4a5a;border-radius:10px;padding:12px 16px}
.modal .modal-actions .btn:not(.btn-ghost):not(.btn-danger){background:linear-gradient(135deg,#cc785c,#e8956b);box-shadow:none}
.chart-wrap{position:relative;height:170px;margin:4px 0 0}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:linear-gradient(160deg,#232734,#1b1f29);border-radius:20px;padding:14px 14px 12px;border:1px solid rgba(255,255,255,.06);min-height:90px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
.stat-label{font-size:13px;color:#afb4c3;margin-bottom:8px;font-weight:600}
.stat-value{font-size:32px;font-weight:760;line-height:1.05;word-break:break-word}
.stat-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px}
.asset-cat-list{display:flex;flex-direction:column;gap:10px}
.asset-cat-card{background:linear-gradient(160deg,#1f222b,#171a21);border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:14px 16px;position:relative;cursor:pointer}
.assets-title-row{display:flex;align-items:center;justify-content:space-between}
.asset-cat-top{display:flex;align-items:center;justify-content:space-between;color:var(--text2);font-size:14px}
.asset-cat-amount{margin-top:8px;font-size:44px;font-weight:760;line-height:1}
.asset-cat-pct{margin-top:4px;color:#8f96a7}
.asset-plus{position:absolute;right:10px;top:10px;width:28px;height:28px;border:none;border-radius:999px;background:#252a36;color:#d8dce8;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer}
.asset-detail{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08)}
.asset-detail-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;color:#cfd4df}
.txn-day{background:linear-gradient(160deg,#1f222b,#171a21);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:8px 12px;color:#b6bccb;font-size:13px;margin:14px 0 8px}
.page:not(#page-assets) .card,
.page:not(#page-assets) .row-item,
.page:not(#page-assets) .stat-card{
  box-shadow:none!important;
  background:#1b1e26!important;
}
.page:not(#page-assets) .nw-card{
  box-shadow:none!important;
  background:#1b1e26!important;
}
.page#page-dash .nw-card{
  background:radial-gradient(120% 140% at 85% 10%,rgba(255,138,114,.23) 0%,rgba(255,138,114,.08) 35%,rgba(255,138,114,0) 72%),linear-gradient(155deg,#232835,#1a1e28)!important;
  box-shadow:0 20px 32px rgba(0,0,0,.28)!important;
}
.page#page-dash .stat-card{
  background:linear-gradient(160deg,#232734,#1b1f29)!important;
  box-shadow:0 12px 24px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.03);
}
#txns-list .row-amount{
  color:var(--text)!important;
}
.cat-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.cat-row:last-child{border-bottom:none}
.cat-name{font-size:14px;font-weight:500;cursor:pointer;flex:1;padding:2px 4px;border-radius:4px;border:1px solid transparent;background:none;color:var(--text);outline:none;transition:border-color .15s}
.cat-name:hover{border-color:var(--border)}
.cat-name:focus{border-color:var(--primary);background:var(--bg2)}
.deleted-cat{color:var(--text2);font-style:italic;font-size:13px}
.drag-handle{color:var(--text2);font-size:16px;cursor:grab;padding:0 8px 0 0;user-select:none;flex-shrink:0;touch-action:none}
.drag-handle:active{cursor:grabbing}
.cat-row.dnd-over{background:var(--bg2);border-color:var(--primary);box-shadow:inset 0 -2px 0 var(--primary)}
.toggle-group{display:flex;background:linear-gradient(160deg,#1f222b,#171a21);border-radius:14px;padding:6px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06)}
.toggle-btn{flex:1;padding:7px;border:none;background:none;color:var(--text2);font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;transition:all .15s}
.toggle-btn.active{background:var(--primary);color:#fff;box-shadow:0 8px 16px rgba(255,138,114,.24)}
.progress-bar{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:4px;background:var(--primary);transition:width .3s}

.fab{position:fixed;right:18px;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 20px);width:46px;height:46px;border-radius:999px;background:#232733;color:#e7eaf3;font-size:28px;font-weight:300;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:98;transition:transform .15s,background .15s;line-height:1}
.fab:active{transform:scale(.92);background:#2a3140}
.fab.hidden{display:none!important}

.btn-icon-del{background:none;border:none;color:var(--text2);cursor:pointer;padding:5px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:color .15s;flex-shrink:0}
.btn-icon-del:hover{color:var(--primary)}
.btn-icon-del svg{width:15px;height:15px;display:block}
/* Monthly summary unified card */
.msum-card{margin-bottom:12px}
.msum-month-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.msum-nav{background:none;border:none;color:var(--text2);font-size:17px;cursor:pointer;padding:4px 10px;border-radius:6px;line-height:1;transition:color .15s}
.msum-nav:active{color:var(--primary)}
.msum-month-btn{background:none;border:none;color:var(--text);font-size:15px;font-weight:700;cursor:pointer;padding:4px 14px;border-radius:8px;min-width:120px;text-align:center}
.msum-month-btn:active{background:var(--bg3)}
.msum-stats{display:flex;justify-content:space-between;align-items:flex-start;padding:0 6px;margin-bottom:2px}
.msum-stat{cursor:pointer;padding:4px 0;transition:opacity .15s;flex:1}
.msum-stat:active{opacity:.65}
.msum-exp{text-align:left}
.msum-inc{text-align:right}
.msum-stat-label{font-size:12px;font-weight:600;margin-bottom:5px}
.msum-stat-value{font-size:21px;font-weight:700}
.msum-exp .msum-stat-label{color:#ff8a72}
.msum-inc .msum-stat-label{color:#57c498}
.msum-exp .msum-stat-value{color:#ff8a72}
.msum-inc .msum-stat-value{color:#57c498}
.msum-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;line-height:1.4}
.msum-center-emoji{font-size:20px;margin-bottom:1px}
.msum-center-sub{font-size:10px;color:var(--text2);margin-bottom:1px}
.msum-center-val{font-size:15px;font-weight:700}
/* Chart center overlay (breakdown page) */
.chart-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;line-height:1.3}
.chart-center .cc-val{font-size:13px;font-weight:700}
.chart-center .cc-sub{font-size:10px;color:var(--text2)}
/* Breakdown page */
.bd-header{display:flex;align-items:center;gap:10px;margin-bottom:4px;padding-top:12px}
.back-btn{background:none;border:none;color:var(--primary);cursor:pointer;font-size:22px;padding:0 4px;line-height:1}
/* Month picker modal */
.mpick-year{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mpick-year-nav{background:none;border:1px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;padding:4px 14px;border-radius:8px}
.mpick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mpick-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s}
.mpick-btn.cur{background:var(--primary);border-color:var(--primary);color:#fff}
@media (max-width:420px){
  .nw-value{font-size:44px}
  .stat-value{font-size:32px}
  .asset-cat-amount{font-size:40px}
}
</style>
</head>
<body>

<!-- PAGES -->
<div id="page-dash" class="page active">
  <div class="nw-card">
    <div class="nw-growth">▲ +1.54%</div>
    <div class="nw-label">現有資產</div>
    <div class="nw-value" id="nw-total">$0</div>
    <div class="nw-sub">
      <div class="nw-sub-item">
        <div class="nw-sub-label">總資產</div>
        <div class="nw-sub-value pos" id="nw-assets">$0</div>
      </div>
    </div>
    <canvas id="chart-networth-trend" class="hero-sparkline"></canvas>
  </div>
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label"><span class="stat-dot" style="background:#8e6ee9"></span>銀行存款</div>
      <div class="stat-value" id="dash-banks">$0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><span class="stat-dot" style="background:#64b5f6"></span>投資帳號</div>
      <div class="stat-value" id="dash-crypto">$0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><span class="stat-dot" style="background:#5ab79f"></span>現金</div>
      <div class="stat-value" id="dash-cash">$0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><span class="stat-dot" style="background:#b56e6f"></span>信用卡</div>
      <div class="stat-value amount-neg" id="dash-cards">$0</div>
    </div>
  </div>
  <div class="card">
    <h3>資產分佈</h3>
    <div class="chart-wrap"><canvas id="chart-doughnut"></canvas></div>
  </div>
  <div class="card msum-card">
    <div class="msum-month-row">
      <button class="msum-nav" onclick="shiftDashMonth(-1)">◀</button>
      <button class="msum-month-btn" id="dash-month-btn" onclick="openMonthPicker()">2026年4月</button>
      <button class="msum-nav" onclick="shiftDashMonth(1)">▶</button>
    </div>
    <div class="msum-stats">
      <div class="msum-stat msum-exp" onclick="openBreakdown('expense')">
        <div class="msum-stat-label">月支出 ›</div>
        <div class="msum-stat-value" id="dash-month-exp">$0</div>
      </div>
      <div class="msum-stat msum-inc" onclick="openBreakdown('income')">
        <div class="msum-stat-label">月收入 ›</div>
        <div class="msum-stat-value" id="dash-month-inc">$0</div>
      </div>
    </div>
    <div style="position:relative;height:200px;margin-top:6px">
      <canvas id="chart-monthly"></canvas>
      <div class="msum-center">
        <div class="msum-center-sub">月結餘</div>
        <div class="msum-center-val" id="chart-monthly-balance">$0</div>
      </div>
    </div>
  </div>
</div>



<div id="page-breakdown" class="page">
  <div class="bd-header">
    <button class="back-btn" onclick="closeBreakdown()">‹</button>
    <h2 id="breakdown-title" style="margin:0;font-size:17px"></h2>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="position:relative;width:130px;height:130px;flex-shrink:0">
        <canvas id="chart-breakdown"></canvas>
        <div class="chart-center" style="top:50%;left:50%">
          <div class="cc-sub">總計</div>
          <div class="cc-val" id="breakdown-total-text">$0</div>
        </div>
      </div>
      <div id="breakdown-legend" style="flex:1;font-size:12px;line-height:1.8"></div>
    </div>
  </div>
  <div id="breakdown-list" style="margin-top:4px"></div>
</div>

<div id="page-txns" class="page">
  <div style="padding-top:12px"></div>
  <h2>交易記錄</h2>
  <div class="form-group">
    <input type="month" id="txn-month" onchange="renderTxns()">
  </div>
  <div class="toggle-group">
    <button class="toggle-btn active" id="txn-filter-all" onclick="setTxnFilter('all')">全部</button>
    <button class="toggle-btn" id="txn-filter-income" onclick="setTxnFilter('income')">收入</button>
    <button class="toggle-btn" id="txn-filter-expense" onclick="setTxnFilter('expense')">支出</button>
    <button class="toggle-btn" id="txn-filter-invest" onclick="setTxnFilter('invest')">投資</button>
  </div>
  <div id="txns-list"></div>
  <button class="fab" onclick="openTxnModal()">+</button>
</div>

<div id="page-poker" class="page">
  <div style="padding-top:12px"></div>
  <h2>撲克記錄</h2>
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">總盈虧</div>
      <div class="stat-value" id="poker-total">$0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">局數</div>
      <div class="stat-value" id="poker-count">0</div>
    </div>
  </div>
  <div id="poker-list"></div>
  <button class="fab" onclick="openPokerModal()">+</button>
</div>

<div id="page-loans" class="page">
  <div style="padding-top:12px"></div>
  <h2>借貸管理</h2>
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-label">潑出去的水</div>
      <div class="stat-value amount-pos" id="loans-recv">$0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">欠款</div>
      <div class="stat-value amount-neg" id="loans-owe">$0</div>
    </div>
  </div>
  <div id="loans-list"></div>
  <button class="fab" onclick="openLoanModal()">+</button>
</div>

<div id="page-assets" class="page">
  <div style="padding-top:12px"></div>
  <div class="assets-title-row">
    <h2 style="margin:0">資產</h2>
  </div>
  <div style="color:var(--text2);margin-top:-8px;margin-bottom:12px">Assets</div>
  <div class="card">
    <div class="nw-label">現有資產</div>
    <div class="nw-value" id="assets-total">$0</div>
    <div style="margin-top:10px;color:var(--success)" id="assets-trend">+0.00% · +$0</div>
  </div>
  <h3 style="margin:2px 4px 8px">分類 - BY CATEGORY</h3>
  <div id="assets-category-list" class="asset-cat-list"></div>
  <button class="fab" onclick="addAssetCategory()">+</button>
</div>

<div id="page-settings" class="page">
  <div style="padding-top:12px"></div>
  <h2>設定</h2>
  <div class="card">
    <div class="section-header">
      <h3>收入類別</h3>
      <button class="btn btn-sm" onclick="addCat('income')">+ 新增</button>
    </div>
    <div id="inc-cats-list"></div>
  </div>
  <div class="card">
    <div class="section-header">
      <h3>支出類別</h3>
      <button class="btn btn-sm" onclick="addCat('expense')">+ 新增</button>
    </div>
    <div id="exp-cats-list"></div>
  </div>
  <div class="card">
    <div class="section-header">
      <h3>固定交易</h3>
      <button class="btn btn-sm" onclick="openRecurringModal()">+ 新增</button>
    </div>
    <div id="recurring-list"></div>
  </div>
  <div class="card">
    <h3>數據管理</h3>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">
      <button class="btn btn-ghost" onclick="exportData()">匯出數據 (JSON)</button>
      <button class="btn btn-danger" onclick="clearAllData()">清除所有數據</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="goPage('dash',this)"><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='3' width='7' height='7' rx='1.2'/><rect x='14' y='3' width='7' height='7' rx='1.2'/><rect x='3' y='14' width='7' height='7' rx='1.2'/><rect x='14' y='14' width='7' height='7' rx='1.2'/></svg>總覽</button>
  <button class="nav-item" onclick="goPage('assets',this)"><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z'/></svg>資產</button>
  <button class="nav-item" onclick="goPage('txns',this)"><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><line x1='5' y1='8' x2='19' y2='8'/><polyline points='15 4 19 8 15 12'/><line x1='19' y1='16' x2='5' y2='16'/><polyline points='9 20 5 16 9 12'/></svg>交易</button>
  <button class="nav-item" onclick="goPage('poker',this)"><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><rect x='2' y='8' width='13' height='15' rx='2'/><path d='M5 8V6a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2h-2'/></svg>撲克</button>
  <button class="nav-item" onclick="goPage('loans',this)"><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='9'/><polyline points='12 7 12 12 15.5 15.5'/></svg>借貸</button>
  <button class="nav-item" onclick="goPage('settings',this)"><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='3'/><path d='M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z'/></svg>設定</button>
</nav>

<!-- MODALS -->
<div id="modal-bank" class="modal-overlay" style="display:none" onclick="closeModalOutside(event,'modal-bank')">
  <div class="modal">
    <div class="modal-title" id="modal-bank-title">新增銀行帳戶</div>
    <input type="hidden" id="bank-edit-id">
    <div class="form-group"><label>銀行名稱</label><input id="bank-name" placeholder="例：匯豐銀行"></div>
    <div class="form-group"><label>帳戶類型</label>
      <select id="bank-type">
        <option value="checking">支票戶口</option>
        <option value="savings">儲蓄戶口</option>
        <option value="investment">投資帳戶</option>
        <option value="other">其他</option>
      </select>
    </div>
    <div class="form-group"><label>餘額 (HKD)</label><input id="bank-balance" type="number" placeholder="0" step="0.01"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-bank')">取消</button>
      <button class="btn" onclick="saveBank()">儲存</button>
    </div>
  </div>
</div>

<div id="modal-txn" class="modal-overlay" style="display:none" onclick="closeModalOutside(event,'modal-txn')">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="modal-title" id="modal-txn-title" style="margin:0">新增交易</div>
      <button class="btn btn-sm btn-ghost" onclick="openRecurringModal()" style="font-size:11px;white-space:nowrap">＋固定交易</button>
    </div>
    <input type="hidden" id="txn-edit-id">
    <div class="toggle-group">
      <button class="toggle-btn active" id="txn-type-income" onclick="setTxnType('income')">收入</button>
      <button class="toggle-btn" id="txn-type-expense" onclick="setTxnType('expense')">支出</button>
    </div>
    <div class="form-row">
      <div class="form-group"><label>日期</label><input id="txn-date" type="date"></div>
      <div class="form-group"><label>金額 (HKD)</label><input id="txn-amount" type="number" placeholder="0" step="0.01"></div>
    </div>
    <div class="form-group"><label>類別</label><select id="txn-category" onchange="onTxnCatChange(this)"></select>
      <div id="txn-new-cat-row" style="display:none;margin-top:8px">
        <div style="display:flex;gap:8px;align-items:center">
          <input id="txn-new-cat-input" placeholder="新類別名稱" style="flex:1">
          <button class="btn btn-sm" onclick="confirmTxnNewCat()" style="white-space:nowrap;flex-shrink:0">確認</button>
        </div>
      </div>
    </div>
    <div class="form-group"><label>資產 *</label><select id="txn-asset"></select></div>
    <div class="form-group"><label>備註</label><input id="txn-note" placeholder="選填"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-txn')">取消</button>
      <button class="btn" onclick="saveTxn()">儲存</button>
    </div>
  </div>
</div>

<div id="modal-poker" class="modal-overlay" style="display:none" onclick="closeModalOutside(event,'modal-poker')">
  <div class="modal">
    <div class="modal-title" id="modal-poker-title">新增撲克記錄</div>
    <input type="hidden" id="poker-edit-id">
    <div class="form-row">
      <div class="form-group"><label>日期</label><input id="poker-date" type="date"></div>
      <div class="form-group"><label>類型</label><select id="poker-venue"><option value="Live">Live</option><option value="Online">Online</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>買入 (HKD)</label><input id="poker-buyin" type="number" placeholder="0" step="0.01"></div>
      <div class="form-group"><label>兌現 (HKD)</label><input id="poker-cashout" type="number" placeholder="0" step="0.01"></div>
    </div>
    <div class="form-group"><label>備註</label><input id="poker-note" placeholder="選填"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-poker')">取消</button>
      <button class="btn" onclick="savePoker()">儲存</button>
    </div>
  </div>
</div>

<div id="modal-loan" class="modal-overlay" style="display:none" onclick="closeModalOutside(event,'modal-loan')">
  <div class="modal">
    <div class="modal-title" id="modal-loan-title">新增借貸</div>
    <input type="hidden" id="loan-edit-id">
    <div class="toggle-group">
      <button class="toggle-btn active" id="loan-type-lent" onclick="setLoanType('lent')">借出</button>
      <button class="toggle-btn" id="loan-type-borrowed" onclick="setLoanType('borrowed')">借入</button>
    </div>
    <div class="form-row">
      <div class="form-group"><label>對象</label><input id="loan-person" placeholder="姓名"></div>
      <div class="form-group"><label>日期</label><input id="loan-date" type="date"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>金額 (HKD)</label><input id="loan-amount" type="number" placeholder="0" step="0.01"></div>
      <div class="form-group"><label>月息 (%)</label><input id="loan-rate" type="number" placeholder="0" step="0.01" min="0"></div>
    </div>
    <div class="form-group"><label>備註</label><input id="loan-note" placeholder="選填"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-loan')">取消</button>
      <button class="btn" onclick="saveLoan()">儲存</button>
    </div>
  </div>
</div>

<div id="modal-cash" class="modal-overlay" style="display:none" onclick="closeModalOutside(event,'modal-cash')">
  <div class="modal">
    <div class="modal-title">編輯現金</div>
    <div class="form-group"><label>手頭現金 (HKD)</label><input id="cash-input" type="number" placeholder="0" step="0.01"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-cash')">取消</button>
      <button class="btn" onclick="saveCash()">儲存</button>
    </div>
  </div>
</div>

<div id="modal-crypto" class="modal-overlay" style="display:none" onclick="closeModalOutside(event,'modal-crypto')">
  <div class="modal">
    <div class="modal-title" id="modal-crypto-title">新增投資帳戶</div>
    <input type="hidden" id="crypto-edit-id">
    <div class="form-group"><label>名稱</label><input id="crypto-name" placeholder="例：港股、美股基金"></div>
    <div class="form-group"><label>現值 (HKD)</label><input id="crypto-value" type="number" placeholder="0" step="0.01"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-crypto')">取消</button>
      <button class="btn" onclick="saveCrypto()">儲存</button>
    </div>
  </div>
</div>

<div id="modal-card" class="modal-overlay" style="display:none" onclick="closeModalOutside(event,'modal-card')">
  <div class="modal">
    <div class="modal-title" id="modal-card-title">新增信用卡</div>
    <input type="hidden" id="card-edit-id">
    <div class="form-row">
      <div class="form-group"><label>信用卡名稱</label><input id="card-name" placeholder="例：Visa 渣打"></div>
      <div class="form-group"><label>未還款額 (HKD)</label><input id="card-balance" type="number" placeholder="0" step="0.01"></div>
    </div>
    <div class="form-group"><label>信用額度 (HKD)</label><input id="card-limit" type="number" placeholder="選填" step="0.01"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-card')">取消</button>
      <button class="btn" onclick="saveCard()">儲存</button>
    </div>
  </div>
</div>

<div id="modal-month" class="modal-overlay" style="display:none" onclick="closeModalOutside(event,'modal-month')">

<div id="modal-recurring" class="modal-overlay" style="display:none" onclick="closeModalOutside(event,'modal-recurring')">

    </div>
  </div>
</div>

// Storage
const K={cash:'pf_cash',banks:'pf_banks',txns:'pf_txns',poker:'pf_poker',loans:'pf_loans',crypto:'pf_crypto',cards:'pf_cards',incCats:'pf_inc_cats',expCats:'pf_exp_cats',recurring:'pf_recurring',assetCats:'pf_asset_cats'};
function sv(k,v){localStorage.setItem(k,JSON.stringify(v))}
function ld(k){try{const v=localStorage.getItem(k);return v===null?null:JSON.parse(v)}catch(e){return null}}

// Categories
const DEFAULT_INC=['Poker (Live)','Poker (Online)','生活費','薪水','TFT','股息','利息收入','Other'];
const DEFAULT_EXP=['Poker Loss (Live)','Poker Loss (Online)','購物','停車場','晚餐','午餐','早餐','娛樂','交通','房租','日用品','GAS','禮物','點心','飲品','保險','數位','Other'];
function getIncCats(){const s=ld(K.incCats);return s!==null?s:[...DEFAULT_INC]}
function getExpCats(){const s=ld(K.expCats);return s!==null?s:[...DEFAULT_EXP]}
function initCats(){
  if(ld(K.incCats)===null)sv(K.incCats,[...DEFAULT_INC]);
  if(ld(K.expCats)===null)sv(K.expCats,[...DEFAULT_EXP]);
  var inc=getIncCats(),incChanged=false;
  [['Poker (live)','Poker (Live)'],['Poker (online)','Poker (Online)']].forEach(function(p){
    var i=inc.indexOf(p[0]);if(i>=0){inc[i]=p[1];incChanged=true;}
  });
  if(!inc.includes('Poker (Live)')){inc.unshift('Poker (Live)');incChanged=true;}
  if(!inc.includes('Poker (Online)')){inc.splice(inc.indexOf('Poker (Live)')+1,0,'Poker (Online)');incChanged=true;}
  if(incChanged)sv(K.incCats,inc);
  var exp=getExpCats(),expChanged=false;
  var ol=exp.indexOf('Poker Loss');
  if(ol>=0){exp.splice(ol,1,'Poker Loss (Live)','Poker Loss (Online)');expChanged=true;}
  if(!exp.includes('Poker Loss (Live)')){exp.unshift('Poker Loss (Live)');expChanged=true;}
  if(!exp.includes('Poker Loss (Online)')){exp.splice(exp.indexOf('Poker Loss (Live)')+1,0,'Poker Loss (Online)');expChanged=true;}
  if(expChanged)sv(K.expCats,exp);
}
function displayCat(type,cat){const list=type==='income'?getIncCats():getExpCats();return list.includes(cat)?cat:null}

// Data getters
function getBanks(){return ld(K.banks)||[]}
function getTxns(){return ld(K.txns)||[]}
function getPoker(){return ld(K.poker)||[]}
function getLoans(){return ld(K.loans)||[]}
function getCrypto(){return ld(K.crypto)||[]}
function getCards(){return ld(K.cards)||[]}
function getCash(){return ld(K.cash)||0}
function getRecurring(){return ld(K.recurring)||[]}
function getAssetCats(){return ld(K.assetCats)||[]}

// Utils
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function fmt(n){return '$'+Math.abs(n).toLocaleString('en-HK',{minimumFractionDigits:0,maximumFractionDigits:0})}
function fmtSigned(n){return (n>=0?'+':'-')+' $'+Math.abs(n).toLocaleString('en-HK',{minimumFractionDigits:0,maximumFractionDigits:0})}

// Navigation
function goPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='dash')renderDash();
  if(id==='txns')renderTxns();
  if(id==='poker')renderPoker();
  if(id==='loans')renderLoans();
  if(id==='assets')renderAssets();
  if(id==='settings')renderSettings();
}

// Modals
function openModal(id){document.getElementById(id).style.display='flex'}
function closeModal(id){document.getElementById(id).style.display='none'}
function closeModalOutside(e,id){if(e.target.id===id)closeModal(id)}

// Charts
let chartDoughnut=null,chartMonthly=null,chartBreakdown=null,chartTrend=null;
let assetsExpandedLabel='';
// State
let dashMonth='';
let mpickYear=new Date().getFullYear();
let recType='expense';

function renderDash(){
  const banks=getBanks(),txns=getTxns(),loans=getLoans(),crypto=getCrypto(),cards=getCards();
  const bankTotal=banks.reduce((s,b)=>s+b.balance,0);
  const cash=getCash();
  const cryptoTotal=crypto.reduce((s,c)=>s+c.value,0);
  const cardTotal=cards.reduce((s,c)=>s+c.balance,0);
  const loanLent=loans.filter(l=>l.ltype==='lent'&&!l.settled).reduce((s,l)=>s+calcLoanTotal(l),0);
  const loanBorrowed=loans.filter(l=>l.ltype==='borrowed'&&!l.settled).reduce((s,l)=>s+calcLoanTotal(l),0);
  const presentAssets=bankTotal+cash+cryptoTotal; // 現有資產: cash + bank + investments only
  const totalAssets=bankTotal+cash+cryptoTotal+loanLent-cardTotal-loanBorrowed; // 總資產: 現有資產+借款-負債
  document.getElementById('nw-total').textContent=fmt(presentAssets);
  document.getElementById('nw-assets').textContent=fmt(totalAssets);
  document.getElementById('dash-banks').textContent=fmt(bankTotal);
  document.getElementById('dash-cash').textContent=fmt(cash);
  document.getElementById('dash-crypto').textContent=fmt(cryptoTotal);
  document.getElementById('dash-cards').textContent=fmt(cardTotal);
  // 30-day net worth trend (reverse-replay by transactions)
  const trendDays=30;
  const MS_DAY=86400000;
  const now=new Date();
  const startDate=new Date(now.getFullYear(),now.getMonth(),now.getDate()-(trendDays-1));
  const trendPoints=[];
  for(let i=0;i<trendDays;i++){
    const day=new Date(startDate.getFullYear(),startDate.getMonth(),startDate.getDate()+i);
    const dayKey=day.toISOString().slice(0,10);
    trendPoints.push({key:dayKey,v:presentAssets});
  }
  txns.forEach(t=>{
    if(!t.date||typeof t.amount!=='number')return;
    for(let i=0;i<trendPoints.length;i++){
      if(trendPoints[i].key>=t.date){
        trendPoints[i].v+=(t.type==='income'?t.amount:-t.amount);
      }
    }
  });
  const firstV=trendPoints[0]?.v||0;
  const lastV=trendPoints[trendPoints.length-1]?.v||0;
  const pctEl=document.querySelector('.nw-growth');
  const pct=firstV===0?0:((lastV-firstV)/Math.abs(firstV))*100;
  pctEl.textContent=`${pct>=0?'▲':'▼'} ${pct>=0?'+':''}${pct.toFixed(2)}%`;
  pctEl.style.background=pct>=0?'rgba(87,196,152,.18)':'rgba(255,125,113,.18)';
  pctEl.style.color=pct>=0?'#8ae5bc':'#ffb2a9';
  const tCtx=document.getElementById('chart-networth-trend').getContext('2d');
  if(chartTrend)chartTrend.destroy();
  const tGrad=tCtx.createLinearGradient(0,0,0,68);
  tGrad.addColorStop(0,'rgba(255,138,114,.38)');
  tGrad.addColorStop(1,'rgba(255,138,114,0)');
  chartTrend=new Chart(tCtx,{
    type:'line',
    data:{labels:trendPoints.map(p=>p.key.slice(5)),datasets:[{data:trendPoints.map(p=>p.v),borderColor:'#ff8a72',backgroundColor:tGrad,fill:true,tension:.42,borderWidth:2.2,pointRadius:0,pointHitRadius:8}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}},
    plugins:[{id:'glowLine',beforeDatasetDraw(chart,args){if(args.index!==0)return;const c=chart.ctx;c.save();c.shadowColor='rgba(255,138,114,.9)';c.shadowBlur=12;c.shadowOffsetX=0;c.shadowOffsetY=0;},afterDatasetDraw(chart,args){if(args.index!==0)return;chart.ctx.restore();}}]
  });
  // Month label button
  const [mY,mM]=dashMonth.split('-');
  document.getElementById('dash-month-btn').textContent=`${mY}年${parseInt(mM)}月`;
  // Monthly txns
  const mTxns=txns.filter(t=>t.date&&t.date.startsWith(dashMonth));
  const mInc=mTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const mExp=mTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const mNet=mInc-mExp;
  document.getElementById('dash-month-exp').textContent=fmt(mExp);
  document.getElementById('dash-month-inc').textContent=fmt(mInc);
  const balEl=document.getElementById('chart-monthly-balance');
  balEl.textContent=(mNet>=0?'+':'-')+fmt(Math.abs(mNet));
  balEl.style.color=mNet>=0?'var(--success)':'var(--danger)';
  // Asset distribution doughnut
  const dCtx=document.getElementById('chart-doughnut').getContext('2d');
  if(chartDoughnut)chartDoughnut.destroy();
  const _dAll=[{l:'銀行',v:Math.max(0,bankTotal),c:'#9d86f8'},{l:'現金',v:Math.max(0,cash),c:'#5ab79f'},{l:'投資',v:Math.max(0,cryptoTotal),c:'#64b5f6'},{l:'潑出去的水',v:Math.max(0,loanLent),c:'#e8a87c'}].filter(x=>x.v>0);
  const dSum=_dAll.reduce((a,x)=>a+x.v,0);
  chartDoughnut=new Chart(dCtx,{type:'doughnut',data:{labels:_dAll.map(x=>x.l),datasets:[{data:dSum>0?_dAll.map(x=>x.v):[1],backgroundColor:dSum>0?_dAll.map(x=>x.c):['#333'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#e8e8e8',font:{size:11},boxWidth:12}}}}});
  // Monthly income/expense donut
  const mCtx=document.getElementById('chart-monthly').getContext('2d');
  if(chartMonthly)chartMonthly.destroy();
  const mSum=mInc+mExp;
  chartMonthly=new Chart(mCtx,{type:'doughnut',data:{labels:['支出','收入'],datasets:[{data:mSum>0?[mExp,mInc]:[1],backgroundColor:mSum>0?['#ff8a72','#57c498']:['#444'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false}}}});
}

function adjustAsset(assetType,assetId,delta){
  if(!assetType)return;
  if(assetType==='cash'){sv(K.cash,Math.round((getCash()+delta)*100)/100);}
  else if(assetType==='bank'){const b=getBanks();const i=b.findIndex(x=>x.id===assetId);if(i>=0){b[i].balance=Math.round((b[i].balance+delta)*100)/100;sv(K.banks,b);}}
  else if(assetType==='invest'){const c=getCrypto();const i=c.findIndex(x=>x.id===assetId);if(i>=0){c[i].value=Math.round((c[i].value+delta)*100)/100;sv(K.crypto,c);}}
}
function saveTxn(){
  const date=document.getElementById('txn-date').value;
  const amount=parseFloat(document.getElementById('txn-amount').value)||0;
  const category=document.getElementById('txn-category').value;
  const note=document.getElementById('txn-note').value.trim();
  const rawAsset=document.getElementById('txn-asset').value;
  if(!date||!amount)return alert('請填寫日期和金額');
  if(!rawAsset)return alert('請選擇資產');
  const [assetType,assetId=null]=rawAsset.includes(':')?rawAsset.split(':'):[rawAsset,null];
  const id=document.getElementById('txn-edit-id').value;
  const txns=getTxns();
  if(id){
    const old=txns.find(t=>t.id===id);
    if(old&&old.assetType){adjustAsset(old.assetType,old.assetId,old.type==='income'?-old.amount:old.amount);}
    const i=txns.findIndex(t=>t.id===id);
    if(i>=0)txns[i]={...txns[i],date,amount,category,note,type:txnType,assetType,assetId};
    adjustAsset(assetType,assetId,txnType==='income'?amount:-amount);
  } else {
    txns.push({id:uid(),date,amount,category,note,type:txnType,assetType,assetId});
    adjustAsset(assetType,assetId,txnType==='income'?amount:-amount);
  }
  sv(K.txns,txns);
  closeModal('modal-txn');
  renderTxns();
  if(document.getElementById('page-assets').classList.contains('active'))renderAssets();
  if(document.getElementById('page-dash').classList.contains('active'))renderDash();
}
function deleteTxn(id){
  if(!confirm('確定刪除？'))return;
  const t=getTxns().find(x=>x.id===id);
  if(t&&t.assetType){adjustAsset(t.assetType,t.assetId,t.type==='income'?-t.amount:t.amount);}
  sv(K.txns,getTxns().filter(x=>x.id!==id));
  renderTxns();
}

function syncPokerTxn(session){
  const pnl=session.cashout-session.buyin;
  const txns=getTxns().filter(t=>t.id!==session.txnId);
  if(pnl!==0){
    var isOnline=(session.venue||'').toLowerCase()==='online';
    var isProfit=pnl>0;
    var cat=isProfit?(isOnline?'Poker (Online)':'Poker (Live)'):(isOnline?'Poker Loss (Online)':'Poker Loss (Live)');
    txns.push({
      id:session.txnId,
      date:session.date,
      amount:Math.abs(pnl),
      category:cat,
      note:(isProfit?'撲克盈利':'撲克虧損')+' - '+(session.venue||'Live'),
      type:isProfit?'income':'expense',
      pokerLinked:true
    });
  }
  sv(K.txns,txns);
}
function savePoker(){
  const date=document.getElementById('poker-date').value;
  const venue=document.getElementById('poker-venue').value.trim();
  const buyin=parseFloat(document.getElementById('poker-buyin').value)||0;
  const cashout=parseFloat(document.getElementById('poker-cashout').value)||0;
  const note=document.getElementById('poker-note').value.trim();
  if(!date)return alert('請填寫日期');
  const editId=document.getElementById('poker-edit-id').value;
  const sessions=getPoker();
  let session;
  if(editId){
    const i=sessions.findIndex(p=>p.id===editId);
    if(i>=0){
      sessions[i]={...sessions[i],date,venue,buyin,cashout,note,txnId:sessions[i].txnId||uid()};
      session=sessions[i];
    }
  } else {
    session={id:uid(),date,venue,buyin,cashout,note,txnId:uid()};
    sessions.push(session);
  }
  sv(K.poker,sessions);
  if(session)syncPokerTxn(session);
  closeModal('modal-poker');
  renderPoker();
}
function deletePoker(id){
  if(!confirm('確定刪除？'))return;
  const session=getPoker().find(p=>p.id===id);
  if(session?.txnId)sv(K.txns,getTxns().filter(t=>t.id!==session.txnId));
  sv(K.poker,getPoker().filter(p=>p.id!==id));
  renderPoker();
}

// Loans
let loanType='lent';
function setLoanType(t){
  loanType=t;
  ['lent','borrowed'].forEach(x=>document.getElementById('loan-type-'+x).classList.toggle('active',x===t));
}
function calcLoanTotal(loan){
  if(!loan.rate||loan.rate===0)return loan.amount;
  const months=(Date.now()-new Date(loan.date).getTime())/(1000*60*60*24*30.44);
  return loan.amount*(1+loan.rate/100*Math.max(0,months));
}
function renderLoans(){
  const loans=getLoans();
  const active=loans.filter(l=>!l.settled);
  const recv=active.filter(l=>l.ltype==='lent').reduce((s,l)=>s+calcLoanTotal(l),0);
  const owe=active.filter(l=>l.ltype==='borrowed').reduce((s,l)=>s+calcLoanTotal(l),0);
  document.getElementById('loans-recv').textContent=fmt(recv);

          </div>

          <button class="btn btn-sm btn-ghost" onclick="editLoan('${l.id}')">編輯</button>

// Assets
function renderAssets(){
  const banks=getBanks(),txns=getTxns(),loans=getLoans(),crypto=getCrypto();
  const bankTotal=banks.reduce((s,b)=>s+b.balance,0);
  const cash=getCash();
  const cryptoTotal=crypto.reduce((s,c)=>s+c.value,0);
  const loanLent=loans.filter(l=>l.ltype==='lent'&&!l.settled).reduce((s,l)=>s+calcLoanTotal(l),0);
  const customCats=getAssetCats();
  const customTotal=customCats.reduce((s,c)=>s+Math.max(0,Number(c.amount)||0),0);
  const total=bankTotal+cash+cryptoTotal+loanLent+customTotal;
  const presentTotal=bankTotal+cash+cryptoTotal+customTotal; // 現有資產: excludes loans
  document.getElementById('assets-total').textContent=fmt(presentTotal);
  const monthKey=(new Date()).toISOString().slice(0,7);
  const mTxns=txns.filter(t=>t.date&&t.date.startsWith(monthKey));
  const mInc=mTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const mExp=mTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const delta=mInc-mExp;
  const trendEl=document.getElementById('assets-trend');
  const base=Math.max(1,total-delta);
  const pct=((delta/base)*100);
  trendEl.textContent=`${pct>=0?'+':''}${pct.toFixed(2)}% · ${delta>=0?'+':'-'}${fmt(Math.abs(delta))}`;
  trendEl.style.color=delta>=0?'var(--success)':'var(--danger)';
  const rows=[
    {label:'銀行',value:bankTotal,color:'#9d86f8',items:banks.map(b=>({name:b.name,value:b.balance}))},
    {label:'加密',value:cryptoTotal,color:'#64b5f6',items:crypto.map(c=>({name:c.name,value:c.value}))},
    {label:'潑出去的水',value:loanLent,color:'#b194ff',items:loans.filter(l=>l.ltype==='lent'&&!l.settled).map(l=>({name:l.person,value:calcLoanTotal(l)}))},
    {label:'現金',value:cash,color:'#5ab79f',items:[{name:'手頭現金',value:cash}]}
  ];
  customCats.forEach(c=>{
    rows.push({label:c.name,value:Math.max(0,Number(c.amount)||0),color:c.color||'#7d869a',items:[{name:c.name,value:Math.max(0,Number(c.amount)||0)}],isCustom:true,id:c.id});
  });
  rows.sort((a,b)=>b.value-a.value);
  const list=document.getElementById('assets-category-list');
  if(total<=0){list.innerHTML='<div class="empty">尚無資產資料</div>';return;}
  list.innerHTML=rows.map(r=>`<div class="asset-cat-card" onclick="toggleAssetDetails('${r.label}')">
    <div class="asset-cat-top"><div><span class="stat-dot" style="background:${r.color}"></span>${r.label}</div></div>
    <div class="asset-cat-amount">${fmt(r.value)}</div>
    <div class="asset-cat-pct">${((r.value/total)*100).toFixed(1)}%</div>
    ${assetsExpandedLabel===r.label?`<div class="asset-detail">${(r.items&&r.items.length)?r.items.map(it=>`<div class="asset-detail-item"><span>${it.name}</span><strong>${fmt(it.value)}</strong></div>`).join(''):'<div class="asset-detail-item"><span>暫無明細</span></div>'}</div>`:''}
    <button class="asset-plus" onclick="event.stopPropagation();openAssetAdd('${r.label}')">+</button>
  </div>`).join('');
}
function toggleAssetDetails(label){
  assetsExpandedLabel=(assetsExpandedLabel===label?'':label);
  renderAssets();
}

// Settings / Categories
function renameCat(input){
  const type=input.dataset.type,oldName=input.dataset.old,newName=input.value.trim();
  if(!newName){input.value=oldName;return}
  if(newName===oldName)return;
  const isInc=type==='income';
  const key=isInc?K.incCats:K.expCats;
  const cats=isInc?getIncCats():getExpCats();
  if(cats.includes(newName)){alert('此類別已存在');input.value=oldName;return}
  cats[cats.indexOf(oldName)]=newName;
  sv(key,cats);
  const txns=getTxns().map(t=>t.type===type&&t.category===oldName?{...t,category:newName}:t);
  sv(K.txns,txns);
  input.dataset.old=newName;
  updTxnCats();
}
function addCat(type){
  const name=prompt('新增類別名稱：');
  if(!name||!name.trim())return;
  const n=name.trim();
  const isInc=type==='income';
  const key=isInc?K.incCats:K.expCats;
  const cats=isInc?getIncCats():getExpCats();
  if(cats.includes(n))return alert('此類別已存在');
  cats.push(n);sv(key,cats);renderSettings();
}
function deleteCat(type,name){
  if(!confirm(`刪除類別「${name}」？\n此操作不可復原，相關交易將顯示為「已刪除類別」。`))return;
  const isInc=type==='income';
  const key=isInc?K.incCats:K.expCats;
  const cats=(isInc?getIncCats():getExpCats()).filter(c=>c!==name);
  sv(key,cats);renderSettings();updTxnCats();
}
function renderSettings(){
  var sq=String.fromCharCode(39);
  var trashSVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
  function buildCats(type,cats){
    return cats.map(function(c,i){
      return '<div class="cat-row" draggable="true" data-type="'+type+'" data-index="'+i+'" data-name="'+c+'"'
        +' ondragstart="dndStart(event)" ondragover="dndOver(event)" ondrop="dndDrop(event)" ondragend="dndEnd(event)">'
        +'<span class="drag-handle" ontouchstart="tDragStart(event)" ontouchmove="tDragMove(event)" ontouchend="tDragEnd(event)">☰</span>'
        +'<input class="cat-name" value="'+c+'" data-type="'+type+'" data-old="'+c+'"'
        +' onblur="renameCat(this)"'
        +' onkeydown="if(event.key==='+sq+'Enter'+sq+'){this.blur()}else if(event.key==='+sq+'Escape'+sq+'){this.value=this.dataset.old;this.blur()}">'
        +'<button class="btn-icon-del" onclick="deleteCat('+sq+type+sq+','+sq+c+sq+')">'+trashSVG+'</button>'
        +'</div>';
    }).join('');
  }
  document.getElementById('inc-cats-list').innerHTML=buildCats('income',getIncCats());
  document.getElementById('exp-cats-list').innerHTML=buildCats('expense',getExpCats());
  // Recurring list
  const recs=getRecurring();
  const rel=document.getElementById('recurring-list');
  if(!recs.length){rel.innerHTML='<div class="empty" style="padding:16px 0">尚無固定交易</div>';return;}
  const assetLabel=v=>{if(!v||v==='cash')return '現金';const[t,id]=v.includes(':')?v.split(':'):[v,null];if(t==='bank'){const b=getBanks().find(x=>x.id===id);return b?'🏦 '+b.name:'已刪除帳戶';}if(t==='invest'){const c=getCrypto().find(x=>x.id===id);return c?'📈 '+c.name:'已刪除帳戶';}return v;};
  rel.innerHTML=recs.map(function(r){
    var sq=String.fromCharCode(39);
    var monthly=r.frequency==='yearly'?Math.round(r.amount/12):r.amount;
    var freqLabel=r.frequency==='yearly'?`每年 (≈${fmt(monthly)}/月)`:'每月';
    var asset=r.assetType?(r.assetId?r.assetType+':'+r.assetId:r.assetType):'cash';
    return '<div class="row-item"><div class="row-header">'
      +'<div><div class="row-title">'+r.name+'</div>'
      +'<div class="row-sub">'+freqLabel+' &nbsp;|&nbsp; '+assetLabel(asset)+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span class="row-amount '+(r.type==='income'?'amount-pos':'amount-neg')+'">'+(r.type==='income'?'+':'-')+fmt(r.amount)+'</span>'
      +'<button class="btn-icon-del" onclick="deleteRecurring('+sq+r.id+sq+')">'+trashSVG+'</button>'
      +'</div></div></div>';
  }).join('');
}

var _dndSrc=null;
function dndStart(e){_dndSrc=e.currentTarget;e.dataTransfer.effectAllowed='move';setTimeout(function(){if(_dndSrc)_dndSrc.style.opacity='0.4';},0);}
function dndOver(e){e.preventDefault();document.querySelectorAll('.cat-row').forEach(function(r){r.classList.remove('dnd-over');});if(e.currentTarget!==_dndSrc)e.currentTarget.classList.add('dnd-over');}
function dndDrop(e){
  e.preventDefault();
  var tgt=e.currentTarget;
  if(!_dndSrc||tgt===_dndSrc||tgt.dataset.type!==_dndSrc.dataset.type)return;
  var isInc=_dndSrc.dataset.type==='income';
  var cats=isInc?getIncCats():getExpCats();
  cats.splice(parseInt(tgt.dataset.index),0,cats.splice(parseInt(_dndSrc.dataset.index),1)[0]);
  sv(isInc?K.incCats:K.expCats,cats);renderSettings();updTxnCats();
}
function dndEnd(){document.querySelectorAll('.cat-row').forEach(function(r){r.style.opacity='1';r.classList.remove('dnd-over');});_dndSrc=null;}

var _tSrc=null,_tGhost=null,_tType=null,_tIdx=null;
function tDragStart(e){
  e.preventDefault();
  var row=e.currentTarget.closest('.cat-row');
  _tType=row.dataset.type;_tIdx=parseInt(row.dataset.index);_tSrc=row;
  var r=row.getBoundingClientRect();
  _tGhost=row.cloneNode(true);
  _tGhost.style.cssText='position:fixed;left:'+r.left+'px;top:'+r.top+'px;width:'+r.width+'px;opacity:.75;pointer-events:none;z-index:999;background:var(--bg3);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.4);';
  document.body.appendChild(_tGhost);row.style.opacity='0.35';
}
function tDragMove(e){
  e.preventDefault();if(!_tGhost)return;
  var t=e.touches[0];_tGhost.style.top=(t.clientY-24)+'px';
  document.querySelectorAll('.cat-row').forEach(function(r){r.classList.remove('dnd-over');});
  var el=document.elementFromPoint(t.clientX,t.clientY);
  var over=el&&el.closest('.cat-row');
  if(over&&over!==_tSrc&&over.dataset.type===_tType)over.classList.add('dnd-over');
}
function tDragEnd(e){
  e.preventDefault();
  if(_tGhost){document.body.removeChild(_tGhost);_tGhost=null;}
  if(_tSrc)_tSrc.style.opacity='1';
  var over=document.querySelector('.cat-row.dnd-over');
  if(over&&_tSrc&&over!==_tSrc){
    var isInc=_tType==='income';
    var cats=isInc?getIncCats():getExpCats();
    cats.splice(parseInt(over.dataset.index),0,cats.splice(_tIdx,1)[0]);
    sv(isInc?K.incCats:K.expCats,cats);renderSettings();updTxnCats();
  } else {document.querySelectorAll('.cat-row').forEach(function(r){r.classList.remove('dnd-over');});}
  _tSrc=null;
}

// ── Breakdown page ─────────────────────────────────────────────────────────────
let _prevNavEl=null;
function openBreakdown(type){
  const txns=getTxns().filter(t=>t.date&&t.date.startsWith(dashMonth)&&t.type===type);
  const title=type==='expense'?'月支出明細':'月收入明細';
  document.getElementById('breakdown-title').textContent=title;
  // Category totals
  const catMap={};
  txns.forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount;});
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const top5=cats.slice(0,5);
  const total=txns.reduce((s,t)=>s+t.amount,0);
  document.getElementById('breakdown-total-text').textContent=fmt(total);
  // Chart
  const ctx=document.getElementById('chart-breakdown').getContext('2d');
  if(chartBreakdown)chartBreakdown.destroy();
  const colors=['#cc785c','#e8a87c','#64b5f6','#81c784','#ce93d8','#80cbc4'];
  const sum=top5.reduce((s,x)=>s+x[1],0);
  const others=total-sum;
  const labels=top5.map(x=>x[0]);const vals=top5.map(x=>x[1]);const clrs=top5.map((_,i)=>colors[i]);
  if(others>0){labels.push('其他');vals.push(others);clrs.push('#888');}
  chartBreakdown=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data:vals,backgroundColor:clrs,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false}}}});
  // Legend (right side, top 5 only)
  document.getElementById('breakdown-legend').innerHTML=labels.map((l,i)=>{
    var pct=total>0?Math.round(vals[i]/total*100):0;
    return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="width:10px;height:10px;border-radius:50%;background:${clrs[i]};flex-shrink:0"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l}</span><span style="color:var(--text2)">${pct}%</span></div>`;
  }).join('');
  // Transaction list
  const sorted=[...txns].sort((a,b)=>b.date.localeCompare(a.date));
  const trashIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
  document.getElementById('breakdown-list').innerHTML=sorted.length?sorted.map(function(t){
    var sq=String.fromCharCode(39);
    var cat=displayCat(t.type,t.category);
    return '<div class="row-item"><div class="row-header">'
      +'<div><div class="row-title">'+(t.note||cat||t.category)+'</div>'
      +'<div class="row-sub">'+t.date+(cat?' &nbsp;'+cat:'')+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span class="row-amount '+(type==='income'?'amount-pos':'amount-neg')+'">'+(type==='income'?'+':'-')+fmt(t.amount)+'</span>'
      +'<button class="btn-icon-del" onclick="deleteTxn('+sq+t.id+sq+');openBreakdown('+sq+type+sq+')">'+trashIcon+'</button>'
      +'</div></div></div>';
  }).join(''):'<div class="empty">本月無記錄</div>';
  // Show breakdown page
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-breakdown').classList.add('active');
  _prevNavEl=document.querySelector('.nav-item.active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
}
function closeBreakdown(){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-dash').classList.add('active');
  if(_prevNavEl)_prevNavEl.classList.add('active');
  renderDash();
}

// ── Month picker ────────────────────────────────────────────────────────────────
function shiftDashMonth(d){
  const [y,m]=dashMonth.split('-').map(Number);
  const dt=new Date(y,m-1+d,1);
  dashMonth=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
  renderDash();
}
function openMonthPicker(){
  mpickYear=parseInt(dashMonth.split('-')[0]);
  document.getElementById('mpick-year-label').textContent=mpickYear;
  renderMonthPicker();
  openModal('modal-month');
}
function monthPickerYear(d){
  mpickYear+=d;
  document.getElementById('mpick-year-label').textContent=mpickYear;
  renderMonthPicker();
}
function renderMonthPicker(){
  const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const cur=dashMonth;
  document.getElementById('mpick-grid').innerHTML=months.map((m,i)=>{
    var val=mpickYear+'-'+String(i+1).padStart(2,'0');
    return `<button class="mpick-btn${val===cur?' cur':''}" onclick="selectDashMonth('${val}')">${m}</button>`;
  }).join('');
}
function selectDashMonth(m){
  dashMonth=m;
  closeModal('modal-month');
  renderDash();
}

// ── Recurring transactions ──────────────────────────────────────────────────────
function setRecType(t){
  recType=t;
  ['expense','income'].forEach(x=>document.getElementById('rec-type-'+x).classList.toggle('active',x===t));
  const cats=t==='income'?getIncCats():getExpCats();
  document.getElementById('rec-category').innerHTML=cats.map(c=>`<option value="${c}">${c}</option>`).join('');
}
function updRecAssets(sel,selectedVal){
  const opts=[{v:'cash',l:'現金'}];
  getBanks().forEach(b=>opts.push({v:'bank:'+b.id,l:'🏦 '+b.name}));
  getCrypto().forEach(c=>opts.push({v:'invest:'+c.id,l:'📈 '+c.name}));
  sel.innerHTML=opts.map(o=>`<option value="${o.v}"${o.v===selectedVal?' selected':''}>${o.l}</option>`).join('');
}
function openRecurringModal(){
  closeModal('modal-txn');
  document.getElementById('modal-recurring-title').textContent='新增固定交易';
  document.getElementById('rec-edit-id').value='';
  document.getElementById('rec-name').value='';
  document.getElementById('rec-amount').value='';
  document.getElementById('rec-freq').value='monthly';
  recType='expense';
  setRecType('expense');
  updRecAssets(document.getElementById('rec-asset'),'cash');
  openModal('modal-recurring');
}
function saveRecurring(){
  const name=document.getElementById('rec-name').value.trim();
  const amount=parseFloat(document.getElementById('rec-amount').value)||0;
  const category=document.getElementById('rec-category').value;
  const frequency=document.getElementById('rec-freq').value;
  const rawAsset=document.getElementById('rec-asset').value;
  if(!name||!amount)return alert('請填寫名稱和金額');
  const[assetType,assetId=null]=rawAsset.includes(':')?rawAsset.split(':'):[rawAsset,null];
  const id=document.getElementById('rec-edit-id').value;
  const recs=getRecurring();
  if(id){const i=recs.findIndex(r=>r.id===id);if(i>=0)recs[i]={...recs[i],name,amount,category,frequency,type:recType,assetType,assetId,lastApplied:null};}
  else recs.push({id:uid(),name,amount,category,frequency,type:recType,assetType,assetId,lastApplied:null});
  sv(K.recurring,recs);
  closeModal('modal-recurring');
  if(document.getElementById('page-settings').classList.contains('active'))renderSettings();
}
function deleteRecurring(id){
  if(!confirm('確定刪除固定交易？'))return;
  sv(K.recurring,getRecurring().filter(r=>r.id!==id));
  renderSettings();
}
function applyRecurring(){
  const now=new Date();
  const thisMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const recs=getRecurring();
  if(!recs.length)return;
  let txns=getTxns();
  let changed=false;
  recs.forEach(r=>{
    const already=txns.some(t=>t.recurringId===r.id&&t.date.startsWith(thisMonth));
    if(already)return;
    const monthlyAmt=r.frequency==='yearly'?Math.round(r.amount/12*100)/100:r.amount;
    const date=thisMonth+'-01';
    txns.push({id:uid(),date,amount:monthlyAmt,category:r.category,note:r.name,type:r.type,assetType:r.assetType,assetId:r.assetId,recurringId:r.id});
    adjustAsset(r.assetType,r.assetId,r.type==='income'?monthlyAmt:-monthlyAmt);
    changed=true;
  });
  if(changed)sv(K.txns,txns);
}

// PWA Setup
function setupPWA(){
  const icon=COIN_ICON;
  const manifest={name:'Finance HK',short_name:'Finance HK',description:'Personal Finance Tracker',start_url:'./',display:'standalone',background_color:'#1a1a1a',theme_color:'#1a1a1a',icons:[{src:icon,sizes:'192x192',type:'image/png'},{src:icon,sizes:'512x512',type:'image/png'}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  document.getElementById('pwa-manifest').href=URL.createObjectURL(blob);
  if('serviceWorker' in navigator){
    const swCode=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));`;
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
  }
}

// Wire up modal open buttons
document.addEventListener('DOMContentLoaded',()=>{
  setupPWA();
  initCats();
  updTxnCats();
  const n=new Date();
  dashMonth=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  mpickYear=n.getFullYear();
  document.getElementById('txn-month').value=dashMonth;
  applyRecurring();
  // Fix modal open buttons
  document.querySelectorAll('[onclick]').forEach(el=>{
    const oc=el.getAttribute('onclick');
    if(oc==="openModal('modal-bank')")el.setAttribute('onclick','openModal_Bank()');
    if(oc==="openModal('modal-txn')")el.setAttribute('onclick','openTxnModal()');
    if(oc==="openModal('modal-poker')")el.setAttribute('onclick','openPokerModal()');
    if(oc==="openModal('modal-loan')")el.setAttribute('onclick','openLoanModal()');
    if(oc==="openModal('modal-crypto')")el.setAttribute('onclick','openCryptoModal()');
    if(oc==="openModal('modal-card')")el.setAttribute('onclick','openCardModal()');
    if(oc==="openModal('modal-cash')")el.setAttribute('onclick','openCashModal()');
  });
  renderDash();
});

function openCashModal(){document.getElementById('cash-input').value=getCash();openModal('modal-cash')}
</script>
